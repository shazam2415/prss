version: '3.8'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=newsapp
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres

  backend:
    build: ./backend
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db/newsapp
      - SECRET_KEY=change-this-to-a-secure-key
      - APP_USERNAME=admin
      - APP_PASSWORD=admin
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    depends_on:
      - db
    ports:
      - "8050:8000"

  frontend:
    build: ./frontend
    environment:
      - VITE_API_URL=http://localhost:8050/api
    ports:
      - "3050:80"
    depends_on:
      - backend

volumes:
  postgres_data:
